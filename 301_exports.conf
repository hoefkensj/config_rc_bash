#
# Terminal
## Xterm
export term="xterm-256color"

# Default Editor:
export EDITOR="/usr/bin/env nvim"

# NVIDIA
## NVIDIA Vulkan
export VK_ICD_FILENAMES="/usr/share/vulkan/icd.d/nvidia_icd.json"

# PORTAGE
export EIX_LIMIT=0

# SSH
## SSH-AGENT
export GPG_TTY=$(tty)
export SSH_AUTH_SOCK="$(gpgconf --list-dirs agent-ssh-socket)"

# MANPAGER
# Bat as Default Manpager 
export MANPAGER="sh -c 'col -bx | bat -l man -p'"

# PATH
# *"...:"* to check exists if a nested dir might exist eg: if you add your /home/$USER it would also match /home/$USER/.bin without the :
BINDIR="/opt/bin/"
[[ "${PATH}" != *"${BINDIR}:"* ]] && export PATH="${BINDIR}:${PATH}"
BINDIR="/opt/local/bin"
[[ "${PATH}" != *"${BINDIR}:"* ]] && export PATH="${BINDIR}:${PATH}"
BINDIR="/opt/local/shell"
[[ "${PATH}" != *"${BINDIR}:"* ]] && export PATH="${BINDIR}:${PATH}"
BINDIR="${HOME}/.cargo/bin"
[[ "${PATH}" != *"${BINDIR}:"* ]] && export PATH="${BINDIR}:${PATH}"
BINDIR="${HOME}/.bin"
[[ "${PATH}" != *"${BINDIR}:"* ]] && export PATH="${BINDIR}:${PATH}"
BINDIR="${HOME}/.local/bin"
[[ "${PATH}" != *"${BINDIR}:"* ]] && export PATH="${BINDIR}:${PATH}"
unset BINDIR




function localbin(){
	pyscr='import sys,os,pathlib;og=os.environ["PATH"];P=og.split(":");o=pathlib.Path(P[0]).absolute();p=P[1:];n=pathlib.Path(os.getcwd(),".bin").absolute();print(((o == n)*(og))+((n != o)*(":".join([str(n),*p]))) ,end="")'
	python -c "$pyscr" 

}
alias LOCALBIN='export PATH=$( localbin )'

#[[ "${PROMPT_COMMAND}" != *"LOCALBIN"* ]] && export PROMPT_COMMAND="LOCALBIN ; ${PROMPT_COMMAND}"
