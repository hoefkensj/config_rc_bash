HISTSIZE=-1 
HISTFILESIZE="$HISTSIZE" 
HISTCONTROL=''
export BASH_HIST_HOME="/opt/local/scripts/bash/bash_history"
export BASH_HIST_BIN="/opt/local/shell/bash_history"
source "$BASH_HIST_BIN"



function HISTAPPEND(){
	# local ID BASH_HIST_CACHE BASH_HIST_BASH BASH_HIST_HOST 
	# local BASH_HIST_SESSION BASH_HIST_SYSBOOT BASH_HIST_SYSFULL BASH_HIST_SYSMETA BASH_HIST_SYSUNIQ BASH_HIST_LASTCMD BASH_HIST_METACMD
	bash_history update
}

function HISTSTOP() {
	echo "Cleaning up HIST files..." &>2
	bash_history stop &>2
 	sleep 0.1
}

function history(){
	bash_history full
	builtin history "$@"
}

trap HISTSTOP EXIT

HISTSTART
[[ "${PROMPT_COMMAND}" != *"HISTAPPEND"* ]] && export PROMPT_COMMAND="HISTAPPEND ; ${PROMPT_COMMAND}"

