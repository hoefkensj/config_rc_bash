# Share X Server With All Users
xhost + > /dev/null 2>&1

# Dont do anything if not interactivel:
[[ $- != *i* ]] && return

# Load Profile Again when chrooting:
[[ "$UID" == 0 ]] &&  $(systemd-detect-virt -r) && source /etc/profile || :

# Get line numbers with bash -x/set -x:
PS4='-[\e[33m${BASH_SOURCE/.sh}\e[0m: \e[32m${LINENO}\e[0m] ' 

# return sourced scripts and their functions, named:
PS4+='${FUNCNAME[0]:+${FUNCNAME[0]}(): }' 
